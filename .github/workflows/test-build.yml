name: Build

on:
  push:
    branches: [ "main" ]
    paths-ignore: 
      - '**/README.md'
      - '**/.gitignore'
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: nvidia/cuda:12.6.0-devel-ubuntu24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install CMake
        run: apt-get update && apt-get install -y cmake
      - name: Build
        run: |
            git clone https://github.com/muhos/cuarena.git $HOME/cuarena
            export CUARENA_DIR=$HOME/cuarena
            make -C src assert=1
